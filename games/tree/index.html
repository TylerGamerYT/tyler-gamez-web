<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree - Tyler's Gamez</title>
    <link rel="icon" type="image/png" href="../../assets/icons/TylerGamezIconV2.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #0b0c10; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; background: rgba(11, 12, 16, 0.8); backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo-img { width: 35px; height: 35px; border-radius: 6px; }
        .logo { font-size: 24px; font-weight: 800; color: rgb(253, 204, 54); }
        .nav-links a { color: #c5c6c7; text-decoration: none; font-size: 16px; font-weight: 600; padding: 8px 16px; }
        .nav-links a:hover { color: rgb(253, 204, 54); }

        main { flex: 1; max-width: 1100px; width: 100%; margin: 120px auto 60px auto; padding: 0 20px; }

        .back-link { display: inline-flex; align-items: center; color: rgb(253, 204, 54); text-decoration: none; font-size: 14px; font-weight: 600; margin-bottom: 25px; gap: 5px; }
        .back-link:hover { text-decoration: underline; }

        /* Game Detail Layout Split */
        .game-showcase { display: flex; gap: 40px; flex-wrap: wrap; margin-bottom: 40px; }
        .media-side { flex: 1.3; min-width: 320px; }
        .info-side { flex: 1; min-width: 320px; background: #12131a; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 30px; display: flex; flex-direction: column; height: fit-content; }

        /* Gallery/Slideshow styling */
        .main-display { width: 100%; height: 380px; background: #1c1e27; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        .main-display img { width: 100%; height: 100%; object-fit: cover; }
        .thumbnail-row { display: flex; gap: 10px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; }
        .thumb-btn { width: 80px; height: 50px; border-radius: 6px; overflow: hidden; border: 2px solid transparent; cursor: pointer; background: #1c1e27; flex-shrink: 0; opacity: 0.6; transition: all 0.2s; }
        .thumb-btn.active, .thumb-btn:hover { border-color: rgb(253, 204, 54); opacity: 1; }
        .thumb-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* Game Profile Content */
        .game-title { font-size: 36px; font-weight: 900; color: #ffffff; margin-bottom: 5px; }
        .game-studio { font-size: 14px; color: #8f9296; margin-bottom: 20px; }
        .game-studio a { color: rgb(253, 204, 54); text-decoration: none; font-weight: 600; }
        .game-text { color: #c5c6c7; font-size: 15px; line-height: 1.6; margin-bottom: 25px; white-space: pre-line; }

        /* Big Action Button */
        .roblox-play-btn { display: block; text-align: center; background: rgb(253, 204, 54); color: #0b0c10; padding: 15px; border-radius: 8px; text-decoration: none; font-size: 16px; font-weight: 700; transition: transform 0.2s, background 0.2s; box-shadow: 0 4px 15px rgba(253, 204, 54, 0.2); }
        .roblox-play-btn:hover { transform: translateY(-2px); background: #ffe066; }

        /* Meta details area */
        .meta-list { margin-top: 25px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .meta-item { display: flex; justify-content: space-between; font-size: 14px; }
        .meta-label { color: #8f9296; }
        .meta-val { color: #ffffff; font-weight: 600; }

        @media (max-width: 768px) {
            .game-showcase { flex-direction: column; }
            .main-display { height: 260px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../../" class="logo-container">
            <img src="../../assets/icons/TylerGamezIconV2.png" alt="Logo" class="nav-logo-img">
            <div class="logo">Tyler's Gamez</div>
        </a>
        <nav class="nav-links">
            <a href="/games/">Our Games</a>
            <a href="../../about-us/">About Us</a>
        </nav>
    </header>

    <main>
        <a href="/games/" class="back-link">← Back to Experiences</a>

        <div class="game-showcase">
            <div class="media-side">
                <div class="main-display">
                    <img id="viewfinder" src="../../assets/games/tree-banner.jpg" alt="Tree Preview">
                </div>
                <div class="thumbnail-row">
                    <button class="thumb-btn active" onclick="swapImage(this, '../../assets/games/tree-banner.jpg')">
                        <img src="../../assets/games/tree-banner.jpg" alt="Thumb 1">
                    </button>
                </div>
            </div>

            <div class="info-side">
                <h1 class="game-title">Tree</h1>
                <div class="game-studio">Developed by <a href="https://www.roblox.com/communities/403943992/Tyler-s-Gamez#!/about" target="_blank">@Tyler's Gamez</a></div>
                
                <p class="game-text">A tree…
One button.
Every press… something happens.


One player said:
“DON’T TOUCH IT. IT KNOWS.”

The tree… watches.</p>
                
                <a href="https://www.roblox.com/communities/403943992/Tyler-s-Gamez#!/about" target="_blank" class="roblox-play-btn">Play on Roblox</a>

                <div class="meta-list">
                    <div class="meta-item"><span class="meta-label">Status</span><span class="meta-val" style="color: #2ecc71;">Live</span></div>
                    <div class="meta-item"><span class="meta-label">Genre</span><span class="meta-val">Experimental / Mystery</span></div>
                    <div class="meta-item"><span class="meta-label">Platform</span><span class="meta-val">Roblox</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function swapImage(button, imagePath) {
            document.getElementById('viewfinder').src = imagePath;
            let thumbs = document.querySelectorAll('.thumb-btn');
            thumbs.forEach(t => t.classList.remove('active'));
            button.classList.add('active');
        }
    </script>

</body>
</html>
